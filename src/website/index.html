<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Folded Paper Engine">
    <title>Folded Paper Engine</title>
    <style>
        :root {
            --button-top-color: #9acd32;
            --button-bottom-color: #2e8b57;
            --button-glow-color: #2e8b57;
        }

        .red {
            --button-top-color: #ea7f79;
            --button-bottom-color: #cc3934;
            --button-glow-color: #f13e83;
        }

        .blue {
            --button-top-color: #779f9c;
            --button-bottom-color: #4c7379;
            --button-glow-color: #4c97a8;
        }

        @font-face {
            font-family: 'ZCOOLKuaiLe-Regular';
            src: url('./ZCOOLKuaiLe-Regular.ttf');
            font-weight: normal;
        }

        .sticker-text {
            text-shadow: -0.1em -0.1em 0 #fff,
            0.1em -0.1em 0 #fff,
            -0.1em 0.1em 0 #fff,
            0.1em 0.1em 0 #fff,
            0.1em 0.1em 0.2em #000;
        }

        .sticker {
            filter: drop-shadow(-0.15em -0.10em 0 #fff) drop-shadow(0.15em -0.10em 0 #fff) drop-shadow(-0.15em 0.15em 0 #fff) drop-shadow(0.15em 0.15em 0 #fff) drop-shadow(0.15em 0.15em 0.25em #000);
        }

        .button {
            font-family: 'ZCOOLKuaiLe-Regular', sans-serif;
            background: linear-gradient(to bottom, var(--button-top-color) 0%, var(--button-bottom-color) 100%);
            border-radius: 0.5em;
            border: 0.125em solid #fff;
            color: #fff;
            font-size: 2em;
            padding: 0.5em;
            box-shadow: 0.1em 0.1em 0.25em black;
            cursor: pointer;

            transition: background 0.5s;

            &:hover {
                background: linear-gradient(to bottom, var(--button-top-color) 25%, var(--button-bottom-color) 100%);
            }

            &:active {
                background: linear-gradient(to bottom, var(--button-top-color) 25%, var(--button-bottom-color) 75%, var(--button-glow-color) 100%);
            }
        }

        .spacer {
            flex: 1 1 auto;
        }

        html,
        body {
            background-color: #FFC100;
            color: black;
            font-family: 'ZCOOLKuaiLe-Regular', sans-serif;
            margin: 0;
            padding: 0;
            diplay: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: flex-start;
        }

        .header {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: stretch;
            padding: 2em;
            background: linear-gradient(to bottom, #fdbd00 60%, #ffe380 100%);
        }

        .logo-icon {
            width: 8em;
        }

        .dl-icon {
            width: 3.5em;
            margin: -2em -1em -1em -0.5em;
        }

        .web-splash {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            background-color: #E28903;
        }

        .read-the-docs {
            min-height: 30em;
            background: linear-gradient(to bottom, #ffe380 0%, #fdbd00 15%, #fdbd00 100%);
        }
    </style>
</head>
<body>
<header
        class="header"
>
    <img class="logo-icon" src="./logo.svg" alt="Logo">
    <h1 class="sticker-text">
        folded paper engine
    </h1>
    <div class="spacer"></div>
    <button
            class="button"
    >
        Download
        <img class="dl-icon" src="./dl-icon.png" alt="Download">
    </button>
</header>
<main>
    <section
            class="web-splash"
    >
        <img class="web-splash-img" src="./web-splash.png" alt="Splash">
    </section>
    <section
            class="read-the-docs"
    >

    </section>
</main>
<footer>

</footer>
</body>
</html>
