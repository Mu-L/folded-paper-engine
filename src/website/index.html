<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta name="description" content="Folded Paper Engine">
    <title>Folded Paper Engine</title>
    <link rel="icon" type="image/png" href="./icons/favicon-96x96.png" sizes="96x96"/>
    <link rel="icon" type="image/svg+xml" href="./icons/favicon.svg"/>
    <link rel="shortcut icon" href="./icons/favicon.ico"/>
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png"/>
    <meta name="apple-mobile-web-app-title" content="Folded Paper Engine"/>
    <link rel="manifest" href="./icons/site.webmanifest.json"/>
    <link rel="stylesheet" href="./index.css">
    <style>
        .web-splash {
            & > .web-splash-inner {
                &.web-splash-loading {
                    --stripe: 15px;
                    --tile-ratio: calc(2 / cos(45deg));
                    --speed: 250ms;
                    --c1: #9fb837;
                    --c2: #b9d94a;

                    background: repeating-linear-gradient(
                            45deg,
                            var(--c1) 0 var(--stripe),
                            var(--c2) var(--stripe) calc(var(--stripe) * 2)
                    );
                    background-size: calc(var(--stripe) * var(--tile-ratio)) calc(var(--stripe) * var(--tile-ratio));
                    animation: web-splash-candy var(--speed) linear infinite;
                }

                & > .demo-fs-div {
                    display: flex;
                    flex-direction: row;
                    align-items: center;
                    justify-content: center;
                    padding: 2em;
                    font-size: 0.5em;
                    background-color: #e28903;
                }
            }
        }

        @keyframes web-splash-candy {
            to {
                background-position: calc(var(--stripe) * var(--tile-ratio)) 0;
            }
        }
    </style>
    <script type="module">
      import {loadGodot} from './godot-embed.js';

      const fullscreenDemoGame = () => {
        const canvas = document.querySelector("canvas.godot-canvas");

        if (canvas.requestFullscreen) {
          canvas.requestFullscreen({navigationUI: "hide"});
        } else if (canvas.webkitRequestFullscreen) { // Safari
          canvas.webkitRequestFullscreen();
        } else if (canvas.msRequestFullscreen) { // old Edge
          canvas.msRequestFullscreen();
        }
      };
      const demoButton = document.querySelector('.demo-button');
      const loadDemoGame = async () => {
        const webSplashInner = document.querySelector(".web-splash-inner");
        const fsDiv = document.createElement("div");
        const fsBtn = document.createElement("button");

        fsDiv.classList.add("demo-fs-div");
        fsBtn.classList.add("demo-fs-btn");
        fsBtn.classList.add("button");
        fsBtn.innerText = "Full Screen";
        fsDiv.append(fsBtn);

        webSplashInner.innerHTML = "";
        webSplashInner.classList.add('web-splash-loading');

        await loadGodot({
          basePath: "./demo-game",
          executable: "index",
          canvas: webSplashInner,
        }).catch(err => {
          console.error("Godot failed to start:", err);
        });

        webSplashInner.classList.remove('web-splash-loading');
        webSplashInner.classList.remove('base-background');
        webSplashInner.appendChild(fsDiv);
        fsBtn.addEventListener("click", fullscreenDemoGame);
      };

      demoButton.addEventListener('click', loadDemoGame);
    </script>
</head>
