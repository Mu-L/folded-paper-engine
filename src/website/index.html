<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <meta name="description" content="Folded Paper Engine">
    <title>Folded Paper Engine</title>
    <style>
        :root {
            --button-top-color: #9acd32;
            --button-bottom-color: #2e8b57;
            --button-glow-color: #2e8b57;
            --shadow-color: rgba(0, 0, 0, 0.5);
            --shadow-offset: 0.1em;
            --shadow-size: 0.25em;
            --text-shadow-offset: 0.0625em;
            --text-shadow-size: 0.0625em;
            --basic-shadow: var(--shadow-offset) var(--shadow-offset) var(--shadow-size) var(--shadow-color);
            --title-text-shadow: var(--text-shadow-offset) var(--text-shadow-offset) var(--text-shadow-size) var(--shadow-color);
        }

        * {
            box-sizing: border-box;
        }

        .red {
            --button-top-color: #ea7f79;
            --button-bottom-color: #cc3934;
            --button-glow-color: #f13e83;
        }

        .blue {
            --button-top-color: #779f9c;
            --button-bottom-color: #4c7379;
            --button-glow-color: #4c97a8;
        }

        @font-face {
            font-family: 'ZCOOLKuaiLe-Regular';
            src: url('./ZCOOLKuaiLe-Regular.ttf');
            font-weight: normal;
        }

        .button {
            flex: 0 0 auto;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 0.5em;
            font-family: 'ZCOOLKuaiLe-Regular', sans-serif;
            background: linear-gradient(to bottom, var(--button-top-color) 0%, var(--button-bottom-color) 100%);
            border-radius: 0.5em;
            border: 0.125em solid #fff;
            color: #fff;
            font-size: 2em;
            padding: 0.5em;
            box-shadow: var(--basic-shadow);
            cursor: pointer;
            text-decoration: none;

            transition: background 0.5s;

            &:hover {
                background: linear-gradient(to bottom, var(--button-top-color) 25%, var(--button-bottom-color) 100%);
            }

            &:active {
                background: linear-gradient(to bottom, var(--button-top-color) 25%, var(--button-bottom-color) 75%, var(--button-glow-color) 100%);
            }

            & > .button-icon {
                margin: -0.5em;
            }
        }

        .spacer {
            flex: 1 1 auto;
        }

        html,
        body {
            background-color: #ffc100;
            color: black;
            font-family: 'ZCOOLKuaiLe-Regular', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: flex-start;
        }

        .header {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: stretch;
            flex-wrap: wrap;
            padding: 2em;
            background: linear-gradient(to bottom, #ffc100 60%, #ffe380 100%);

            .logo {
                max-width: 80dvw;
            }

            @media screen and (max-width: 768px) {
                justify-content: center;

                & > .spacer {
                    display: none;
                }

                & > .logo {
                    margin-bottom: 1em;
                }
            }
        }

        .dl-icon {
            width: 3.5em;
            margin: -2em -1em -1em -0.5em;
        }

        @keyframes item-float {
            to {
                offset-distance: 100%;
            }
        }

        @keyframes inverse-item-float {
            to {
                offset-distance: -100%;
            }
        }

        .web-splash {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            background-color: #E28903;

            & > .web-splash-inner {
                position: relative;
                background: url('./web-splash-bg.png') center center no-repeat;
                background-size: cover;

                & > .web-splash-img {
                    max-width: 100dvw;
                }

                & > .apple-sticker {
                    position: absolute;
                    left: 12.5%;
                    bottom: -12%;
                    width: 20%;
                    filter: drop-shadow(var(--basic-shadow));
                }

                & > .star-sticker {
                    position: absolute;
                    filter: drop-shadow(var(--basic-shadow));
                    offset-path: circle(5px at 50% 50%);
                    offset-distance: 0%;
                    offset-rotate: 0deg;
                    animation: item-float 5s linear infinite;
                }

                & > .demo-button {
                    position: absolute;
                    offset-path: circle(5px at 35% 52%);
                    offset-distance: 0%;
                    offset-rotate: 0deg;
                    animation: inverse-item-float 5s linear infinite;
                    will-change: transform;
                }

                @media screen and (max-width: 768px) {
                    & > .web-splash-img {
                        opacity: 0;
                    }

                    & > .apple-sticker {
                        display: none;
                    }

                    & > .star-sticker {
                        display: none;
                    }

                    & > .demo-button {
                        left: 50%;
                        bottom: 50%;
                        offset-path: none;
                        transform: translate(-50%, 50%);
                        animation: none;
                    }
                }
            }
        }

        .section {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            justify-content: flex-start;
            background: #ffc100;
            padding: 8em 8em 0 8em;

            &.top-section {
                background: linear-gradient(to bottom, #ffe380 0%, #ffc100 15%, #ffc100 100%);
            }

            header {
                display: flex;
                flex-direction: row;
                align-items: center;
                justify-content: flex-start;
                gap: 1.5em;
                margin-bottom: 4em;

                &.flipped {
                    flex-direction: row-reverse;

                    & > .section-title {
                        text-align: right;
                    }
                }

                .title-graphic {
                    max-width: 15%;
                }

                .section-title {
                    font-size: 3em;
                    color: #fff;
                    text-shadow: var(--title-text-shadow);

                    .section-subtitle {
                        font-size: 0.5em;
                    }
                }
            }

            main {
                flex: 1 1 auto;
                display: flex;
                flex-direction: row;
                align-items: flex-start;
                justify-content: center;
                gap: 2em;

                & > .stack {
                    display: flex;
                    flex-direction: column;
                    align-items: flex-start;
                    justify-content: flex-start;
                    gap: 2em;

                    & > .stack-link {
                        color: #fff;
                        font-size: 2em;
                        text-shadow: var(--title-text-shadow);
                        margin-left: 0.5em;

                        &:hover,
                        &:active {
                            color: #e28903;
                        }

                        &:visited {
                            color: #fff;
                        }
                    }
                }
            }

            @media screen and (max-width: 768px) {
                font-size: 0.75em;
                padding: 2em;
            }
        }

        .footer {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #e28903;
            margin-top: 8em;
            padding: 2em;
            gap: 4em;

            & a {
                text-decoration: none;
            }

            & > .social {
                display: flex;
                flex-direction: row;
                align-items: center;
                justify-content: center;
                gap: 2em;
            }
        }

        .pickle-footer {
            position: relative;
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1em;
            padding: 2em;
            color: #fff;
            font-size: 1.5em;

            & > .pickle-box {
                flex: 1 1 auto;
                display: flex;
                flex-direction: row;
                align-items: center;
                justify-content: center;

                & > img {
                    width: 3em;
                    transition: width 0.5s;

                    &:hover {
                        width: 4em;
                    }
                }
            }
        }

    </style>
</head>
<body>
<header
        class="header"
>
    <img class="logo" src="./logo.png" alt="Logo">
    <div class="spacer"></div>
    <a
            class="button"
            href="#download"
    >
        Download
        <img class="dl-icon" src="./dl-icon.png" alt="Download">
    </a>
</header>
<main>
    <section
            class="web-splash"
    >
        <div
                class="web-splash-inner"
        >
            <img class="web-splash-img" src="./web-splash.png" alt="Splash">
            <img class="apple-sticker" src="./apple-sticker.png" alt="Apple Sticker">
            <img class="star-sticker" src="./splash-star.png" alt="Star Sticker">
            <a class="demo-button button red" href="./demo-game">
                Play the Demo!
                <img class="button-icon" src="./mug-icon.png" alt="A latte in a small, white coffee mug">
            </a>
        </div>
    </section>
    <section
            class="section top-section"
    >
        <header>
            <img class="title-graphic" src="./doc-owl.png" alt="A brown owl holding a document">
            <div
                    class="section-title"
            >
                Get Wise!
                <div class="section-subtitle">
                    Read the Docs...
                </div>
            </div>
        </header>
        <main>
            <button class="button">
                Blender Panels
                <img class="button-icon" src="./blender-logo-icon.png" alt="Blender Logo">
            </button>
            <div
                    class="stack"
            >
                <button class="button">
                    Godot Features
                    <img class="button-icon" src="./godot-logo-icon.png" alt="Godot Logo">
                </button>
                <a class="stack-link" href="./godot-api-docs">
                    Godot API
                </a>
            </div>
        </main>
    </section>
    <section
            id="download"
            class="section"
    >
        <header class="flipped">
            <img class="title-graphic" src="./dl-backpack.png" alt="A red backpack">
            <div
                    class="section-title"
            >
                Pack for Your Adventure...
                <div class="section-subtitle">
                    Download Now!
                </div>
            </div>
        </header>
        <main>
            <button class="button blue">
                Download for Blender
                <img class="button-icon" src="./blender-logo-icon.png" alt="Blender Logo">
            </button>
            <button class="button blue">
                Download for Godot
                <img class="button-icon" src="./godot-logo-icon.png" alt="Godot Logo">
            </button>
        </main>
    </section>
</main>
<footer class="footer">
    <a href="https://papercraft.games" target="_blank">
        <img src="./papercraft-games-logo.png" alt="Papercraft Games">
    </a>
    <div class="social">
        <a href="https://github.com/papercraftgames/folded-paper-engine" target="_blank">
            <img src="./github-logo.png" alt="GitHub">
        </a>
        <a href="https://github.com/papercraftgames/folded-paper-engine" target="_blank">
            <img src="./youtube-logo.png" alt="GitHub">
        </a>
        <a href="https://github.com/papercraftgames/folded-paper-engine" target="_blank">
            <img src="./bluesky-logo.png" alt="GitHub">
        </a>
    </div>
</footer>
<footer class="pickle-footer">
    <div>
        © 2025 Folded Paper Engine. All rights reserved.
    </div>
    <div class="pickle-box">
        <img src="./pickle-icon.png" alt="A green pickle">
        <img src="./pickle-icon.png" alt="A green pickle">
        <img src="./pickle-icon.png" alt="A green pickle">
        <img src="./pickle-icon.png" alt="A green pickle">
        <img src="./pickle-icon.png" alt="A green pickle">
    </div>
</footer>
</body>
</html>
