name: Site Deploy (gh-pages)

on:
  push:
    branches:
      - main
    paths:
      - 'src/website/**'
      - 'src/Game/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-node@v4
        with: { node-version: 18 }

      # Build website + docs (no need to package ZIPs here)
      - name: Build website
        run: yarn deploy-website

      # Godot bits (same as your current flow) — keeps demo + docs fresh
      - name: Cache Godot
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/godot
            ~/.config/godot
            ~/.local/bin/godot
          key: godot-4.5-stable-${{ runner.os }}

      - name: Cache Blender
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/blender
            ~/.local/bin/blender
          key: blender-4.5.0-${{ runner.os }}

      - name: Install Blender 4.5
        if: steps.cache-blender.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p ~/.cache/blender ~/.local/bin
          if [ ! -x ~/.cache/blender/blender-4.5.0-linux-x64/blender ]; then
            sudo apt-get update
            sudo apt-get install -y wget xz-utils
            wget -q https://download.blender.org/release/Blender4.5/blender-4.5.0-linux-x64.tar.xz -O /tmp/blender.tar.xz
            tar -xf /tmp/blender.tar.xz -C ~/.cache/blender
            chmod +x ~/.cache/blender/blender-4.5.0-linux-x64/blender
          fi

          # Make symlink creation safe if it already exists
          ln -sfn ~/.cache/blender/blender-4.5.0-linux-x64/blender ~/.local/bin/blender

      - name: Install Godot 4.5 + templates
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          GODOT_BIN="$HOME/.local/bin/godot"
          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/4.5.stable"

          mkdir -p "$(dirname "$GODOT_BIN")" "$TEMPLATES_DIR"

          if [ ! -x "$GODOT_BIN" ]; then
            wget -q https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_linux.x86_64.zip -O /tmp/godot.zip
            unzip -q /tmp/godot.zip -d "$HOME/.local/bin"
            mv "$HOME/.local/bin/Godot_v4.5-stable_linux.x86_64" "$GODOT_BIN"
            chmod +x "$GODOT_BIN"
          fi

          if [ ! -f "$TEMPLATES_DIR/web_nothreads_release.zip" ]; then
            wget -q https://github.com/godotengine/godot/releases/download/4.5-stable/Godot_v4.5-stable_export_templates.tpz -O /tmp/templates.tpz
            rm -rf /tmp/templates && mkdir -p /tmp/templates
            unzip -q /tmp/templates.tpz -d /tmp/templates
            cp -a /tmp/templates/templates/* "$TEMPLATES_DIR"/
          fi

      - name: Configure Godot Blender path
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.tres <<'EOF'
          [gd_resource type="EditorSettings" format=3]
          [resource]
          filesystem/import/blender/blender3_path = "/home/runner/.local/bin/blender"
          filesystem/import/blender/blender_path = "/home/runner/.local/bin/blender"
          EOF

      - name: Export Godot Web Demo
        run: |
          mkdir -p dist/demo-game
          ~/.local/bin/godot --headless --path src/Game --export-release "Web" ../../dist/demo-game/index.html

      - name: Generate Addon Docs (XML)
        run: |
          mkdir -p dist/docs/ref-xml
          ~/.local/bin/godot --headless --path src/Game \
            --doctool ../../dist/docs/ref-xml \
            --no-docbase \
            --gdscript-docs res://addons/folded_paper_engine

      - name: Convert Addon Docs XML → HTML
        run: yarn deploy-docs

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: dist
          clean: true
          single-commit: true
