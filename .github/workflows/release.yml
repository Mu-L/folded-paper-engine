name: Release (build zips + update version)

on:
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 18 }

      - name: Export VERSION from tag
        run: |
          V="${{ github.event.release.tag_name }}"
          V="${V#v}"
          echo "VERSION=$V" >> $GITHUB_ENV
          echo "Using VERSION=$V"

      - name: Install deps
        run: yarn

      - name: Make dist
        run: mkdir -p dist

      - name: Build Blender add-on ZIP
        run: yarn deploy-blender-addon

      - name: Build Godot add-on ZIP
        run: yarn deploy-godot-addon

      # 🔹 Create a real copy with a stable filename
      - name: Create _latest Godot ZIP
        run: |
          GODOT_ZIP=$(ls dist/*godot*.zip)
          cp "$GODOT_ZIP" dist/folded_paper_engine_godot_latest.zip

      # Attach all zips (including *_latest) to the versioned release
      - name: Upload ZIPs to release
        run: |
          gh release upload "${{ github.event.release.tag_name }}" dist/*.zip --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Ensure 'latest' release exists
      - name: Ensure 'latest' release exists
        run: |
          gh release view latest >/dev/null 2>&1 || \
            gh release create latest \
              --title "Latest Folded Paper Engine" \
              --notes "Rolling 'latest' release used for stable asset links."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 🔹 Upload the stable-named file to the 'latest' release
      - name: Update 'latest' Godot ZIP
        run: |
          gh release upload latest dist/folded_paper_engine_godot_latest.zip --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
