name: Release (build zips + update version)

on:
  release:
    types: [ published ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 18 }

      - name: Export VERSION from tag
        run: |
          V="${{ github.event.release.tag_name }}"
          V="${V#v}"
          echo "VERSION=$V" >> $GITHUB_ENV
          echo "Using VERSION=$V"

      - name: Install deps
        run: yarn

      # Build only the add-on artifacts (no website)
      - name: Make dist
        run: mkdir -p dist

      - name: Build Blender add-on ZIP
        run: yarn deploy-blender-addon

      - name: Build Godot add-on ZIP
        run: yarn deploy-godot-addon

      # Attach all zips (including *_latest) to the versioned release (v1.0.3, etc.)
      - name: Upload ZIPs to versioned release
        run: |
          gh release upload "${{ github.event.release.tag_name }}" dist/*.zip --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 🔹 Ensure there is a dedicated 'latest' release
      - name: Ensure 'latest' release exists
        run: |
          if ! gh release view latest >/dev/null 2>&1; then
            gh release create latest \
              --title "Latest Folded Paper Engine" \
              --notes "Rolling 'latest' release used for stable Godot addon URL." \
              --target "${GITHUB_SHA}"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 🔹 Create an actual file with a stable name
      - name: Create _latest Godot ZIP
        run: |
          GODOT_ZIP=$(ls dist/*godot*.zip | head -n 1)
          cp "$GODOT_ZIP" dist/folded_paper_engine_godot_latest.zip

      # 🔹 Upload the stable-named file to that 'latest' release
      - name: Upload stable latest ZIP to 'latest' release
        run: |
          gh release upload latest dist/folded_paper_engine_godot_latest.zip --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
